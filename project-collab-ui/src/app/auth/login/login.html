<div class="container mt-5" style="max-width:400px">

  <div class="card shadow p-4">

    <h3 class="text-center mb-4">ProjectCollab Login</h3>

    <div class="mb-3">
      <input
        type="email"
        class="form-control"
        placeholder="Email"
        [(ngModel)]="email">
    </div>

    <div class="mb-3">
      <input
        type="password"
        class="form-control"
        placeholder="Password"
        [(ngModel)]="password">
    </div>

    <button
      class="btn btn-primary w-100"
      (click)="login()">

      Login

    </button>

  </div>

</div>
