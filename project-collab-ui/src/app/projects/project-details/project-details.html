
<div class="container mt-4">
  <h2 class="mb-3">{{ projectName }}</h2>
  <h5>Create Task</h5>

  <input
    class="form-control mb-2"
    placeholder="Task title"
    [(ngModel)]="taskTitle"
  >

  <select
    class="form-control mb-2"
    [(ngModel)]="taskStatus">

    <option value="Todo">Todo</option>
    <option value="In Progress">In Progress</option>
    <option value="Completed">Completed</option>

  </select>

  <button
    class="btn btn-success"
    (click)="createTask()">

    Add Task

  </button>

  <h2>Project Tasks</h2>

  <div class="row">

    <div class="col-md-4 mb-3" *ngFor="let task of tasks">

      <div class="card p-3 shadow-sm">

        <h5>
          {{ task.title }}
          <span class="badge ms-2"
            [ngClass]="{
              'bg-secondary': task.status === 'Todo',
              'bg-primary': task.status === 'In Progress',
              'bg-success': task.status === 'Completed'
            }">
            {{ task.status }}
          </span>
        </h5>

        <div class="mb-2">
          <label class="form-label small">Status</label>
          <select class="form-select form-select-sm" [(ngModel)]="task.status" (ngModelChange)="updateTaskStatus(task.id, $event)">
            <option value="Todo">Todo</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
          </select>
        </div>

      </div>

    </div>

  </div>

</div>
<hr>

<h3 class="mt-4">Project Discussion</h3>

<div class="card p-3 mb-3" style="max-height:300px; overflow:auto">

  <div *ngFor="let msg of messages" class="mb-2">

    <strong>User {{ msg.senderId }}:</strong>
    {{ msg.content }}

  </div>

</div>

<div class="input-group">

  <input
    class="form-control"
    placeholder="Type a message"
    [(ngModel)]="messageText">

  <button
    class="btn btn-primary"
    (click)="sendMessage()">

    Send

  </button>

</div>
